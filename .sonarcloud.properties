sonar.projectKey=ilm_go-sdk
sonar.organization=ilm

# exclude generated API models from analysis
sonar.exclusions=connector/model/**
sonar.coverage.exclusions=connector/model/**
# exclude generated API models and example connectors from CPD analysis
sonar.cpd.exclusions=connector/model/**,connector/examples/**


# This is the name and version displayed in the SonarCloud UI.
#sonar.projectName=ilm-go-sdk
#sonar.projectVersion=1.0


# Path is relative to the sonar-project.properties file. Replace "\" by "/" on Windows.
#sonar.sources=.

# Encoding of the source code. Default is default system encoding
#sonar.sourceEncoding=UTF-8
